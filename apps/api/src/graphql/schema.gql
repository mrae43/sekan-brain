scalar JSON

# 1. Organic Data Lifecycle Stages
enum CognitiveStage {
  GARBAGE     # Raw "aha" moment, dumped without structure
  RESONATING  # In transition: LLM generated context, waiting for human validation
  BRAIN       # Validated, fully contextualized, crystallized for deep retrieval
}

# 2. Differentiating Human Intent vs. LLM Generation
type ContextData {
  userNuance: String          # Human input to strengthen the context
  llmGeneratedContext: String # LLM's population of similar contexts/scenarios
  semanticRole: String        # e.g., "Problem", "Solution", "Observation"
  tags: [String!]
  metadata: JSON
}

# 3. Graph Edges (Relationships)
type Relationship {
  targetId: ID!
  type: String!               # e.g., "SUPPORTS", "CONTRADICTS", "RELATES_TO"
  weight: Float!              # Strength of the resonance/connection
  isCrossSubject: Boolean!    # True if connecting entirely different contexts
  explanation: String         # Why did the LLM/Human connect these? (Agentic insight)
}

# 4. Renamed "Sentence" to "GraphNode" to reflect the essence of the brain
type GraphNode {
  id: ID!
  content: String!            # The core thought/dump
  subject: String             # High-level category (optional initially)
  stage: CognitiveStage!
  
  context: ContextData
  relationships: [Relationship!]
  
  createdAt: String!
  updatedAt: String!
}

# 5. Graph RAG Specific Payload (For Visual Node UI)
type GraphResponse {
  nodes:[GraphNode!]!
  edges: [GraphEdge!]!
  aiSynthesis: String         # LLM generated summary connecting the dots of the retrieved graph
}

# Flat edge structure makes frontend Graph visualization (D3.js, React Flow) much easier
type GraphEdge {
  sourceId: ID!
  targetId: ID!
  type: String!
  weight: Float!
}

type Query {
  # The Agentic RAG Trigger: User queries a vague memory or problem
  # Triggers vector search + graph traversal, returns AI synthesis and the visual graph
  findResonatingThoughts(query: String!): GraphResponse!
  
  # For exploring/visualizing a specific context cluster
  expandThoughtGraph(nodeId: ID!, depth: Int = 1): GraphResponse!
  
  # Inbox for Human-in-the-loop: Fetch items waiting to be enriched/validated
  getPendingValidations: [GraphNode!]!
}

type Mutation {
  # Stage 1: Frictionless Dumping (Defaults to GARBAGE stage)
  captureAhaMoment(content: String!, subject: String): GraphNode!

  # Stage 2: AI + Human Enrichment (Moves to RESONATING stage)
  # Called when the user views the garbage and adds context, triggering the LLM to find links
  enrichThought(
    id: ID!, 
    userNuance: String!, 
    semanticRole: String
  ): GraphNode!

  # Stage 3: Validation (Moves to BRAIN stage)
  # The human approves the LLM connections and nuance
  promoteToBrain(
    id: ID!,
    approvedRelationships: [RelationshipInput!]
  ): GraphNode!
}

input RelationshipInput {
  targetId: ID!
  type: String!
  weight: Float
  isCrossSubject: Boolean
  explanation: String
}